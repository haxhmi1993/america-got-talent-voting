version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agt_postgres
    environment:
      POSTGRES_USER: voting_user
      POSTGRES_PASSWORD: voting_pass
      POSTGRES_DB: voting_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voting_user -d voting_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agt_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: agt_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://voting_user:voting_pass@postgres:5432/voting_db
      REDIS_URL: redis://redis:6379
      FINGERPRINT_SALT: ${FINGERPRINT_SALT:-default-salt-change-in-production}
      IP_RATE_LIMIT: ${IP_RATE_LIMIT:-5}
      IP_RATE_WINDOW: ${IP_RATE_WINDOW:-60}
      NONCE_TTL: ${NONCE_TTL:-300}
      ENABLE_ESCALATION: ${ENABLE_ESCALATION:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Seeding database...' &&
        python seed.py &&
        echo 'Starting server...' &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build: ./frontend
    container_name: agt_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
